spring:
  application:
    name: tpt
  datasource:
    url: jdbc:mysql://localhost:3306/tptdb
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  sql:
    init:
      mode: always
server:
  port: 8082

error:
  include-stacktrace: always
  include-exception: true

jwt:
  secret: "ThisIsADevelopmentOnlyJwtSecretKeyThatIsAtLeastThirtyTwoBytesLong!"
  expiration: 3600000

logging:
  level:
    org.springframework.web.servlet.DispatcherServlet: WARN
    org.apache.catalina.core: WARN
    org.springframework.security: DEBUG
    org.springframework.security.web.FilterChainProxy: DEBUG