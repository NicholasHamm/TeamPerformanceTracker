<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Performance Tracker</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container py-4">

    <!-- LOGIN SECTION -->
    <section id="loginView" class="row justify-content-center">
        <div class="col-md-4">
            <h2 class="mb-3">Login</h2>

            <div id="loginError" class="alert alert-danger d-none"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="loginUsername" class="form-label">Username</label>
                    <input id="loginUsername" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input id="loginPassword" type="password" class="form-control" required>
                </div>

                <button id="loginButton" type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </section>

    <!-- APP SECTION -->
    <section id="appView" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 id="pageTitle" class="mb-0">Dashboard</h1>
            <button id="logoutBtn" class="btn btn-outline-danger">Logout</button>
        </div>

        <div id="pageContent"></div>
    </section>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>

<script src="js/util/showMsg.js"></script>
<script src="js/views/admin.js"></script>
<script src="js/views/coach.js"></script>
<script src="js/views/player.js"></script>
<script src="js/views/login.js"></script>
<script src="js/app.js"></script>
</body>
</html>
