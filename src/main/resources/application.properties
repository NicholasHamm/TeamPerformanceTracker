spring.datasource.url=jdbc:mysql://localhost:3306/tptdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.sql.init.mode=always

server.port=8082

server.error.include-stacktrace=always
server.error.include-exception=true

jwt.secret=ThisIsADevelopmentOnlyJwtSecretKeyThatIsAtLeastThirtyTwoBytesLong!
jwt.expiration=3600000

logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.apache.catalina.core=WARN
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG